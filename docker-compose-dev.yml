services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    user: "1000:1000"
    container_name: tumerienda-php
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    env_file:
      - .env.dev
    expose:
      - "9000"
    networks:
      - tumerienda-network

  nginx:
    image: nginx:alpine
    container_name: tumerienda_nginx
    ports:
      - "8093:80"
    volumes:
      - ./src:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tumerienda-network

networks:
  tumerienda-network:
    driver: bridge
