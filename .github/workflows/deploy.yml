name: 🚀 Deploy Laravel src to Hestia

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy src to Hestia server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@152.67.44.214 << 'EOF'

            TMP_DIR=/tmp/tumerienda_deploy
            PUBLIC_HTML=/home/jampasnando/web/tumerienda.sistembo.online/public_html

            # Limpiar
            rm -rf $TMP_DIR

            # Clonar
            git clone https://github.com/jampasnando/tumerienda.git $TMP_DIR

            # Copiar como usuario correcto
            sudo -u jampasnando rsync -av --delete \
              --exclude='.env' \
              --exclude='storage/' \
              --exclude='vendor/' \
              $TMP_DIR/src/ $PUBLIC_HTML/

            cd $PUBLIC_HTML

            # Composer como usuario correcto
            sudo -u jampasnando composer install --no-dev --optimize-autoloader

            # Laravel cache
            sudo -u jampasnando php artisan config:clear
            sudo -u jampasnando php artisan config:cache
            sudo -u jampasnando php artisan route:cache
            sudo -u jampasnando php artisan view:clear
            sudo -u jampasnando php artisan view:cache

            # Storage
            sudo -u jampasnando php artisan storage:link || true

            # Permisos finales
            chmod -R 775 storage bootstrap/cache
            chown -R jampasnando:jampasnando $PUBLIC_HTML

          EOF