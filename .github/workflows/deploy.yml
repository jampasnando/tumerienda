name: 🚀 Deploy Laravel src to Hestia

# Se ejecuta cuando hay push a main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio en Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Cargar la clave SSH para conectarse al servidor
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # 3️⃣ Conectar al servidor y desplegar solo src/
      - name: Deploy src to Hestia server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@152.67.44.214 << 'EOF'

            TMP_DIR=/tmp/tumerienda_deploy
            PUBLIC_HTML=/home/jampasnando/web/tumerienda.sistembo.online/public_html

            sudo rm -rf $TMP_DIR

            git clone https://github.com/jampasnando/tumerienda.git $TMP_DIR

            sudo rsync -av --delete \
              --exclude='.env' \
              --exclude='storage/' \
              --exclude='vendor/' \
              $TMP_DIR/src/ $PUBLIC_HTML/

            cd $PUBLIC_HTML

            sudo composer install --no-dev --optimize-autoloader

            sudo php artisan config:clear
            sudo php artisan config:cache
            sudo php artisan route:cache
            sudo php artisan view:clear
            sudo php artisan view:cache

            sudo php artisan storage:link || true

            sudo chmod -R 775 storage bootstrap/cache

          EOF
